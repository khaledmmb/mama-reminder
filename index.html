<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>دليل الحمل والرضاعة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #fdeff2 0%, #fff5f7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #ff9eb5;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .header h1 { font-size: 1.7rem; }
        .page { padding: 28px 24px; }
        .hidden { display: none; }
        button {
            background: #ff7b9c;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 16px;
            width: 100%;
            border-radius: 60px;
            margin: 12px 0;
            cursor: pointer;
        }
        .option-btn {
            background: #ffe3e9;
            color: #a13e57;
        }
        .back-btn {
            background: #ece2e5;
            color: #5c3b46;
        }
        .tips-list {
            background: #fff0f3;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
        }
        .tip-item {
            background: white;
            padding: 12px 18px;
            margin: 10px 0;
            border-radius: 60px;
            border-right: 5px solid #ff9eb5;
        }
        .status {
            background: #ffdce4;
            border-radius: 50px;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            margin: 10px 0;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 12px;
            color: #ac8a94;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>👶🏻🌷 دليلكِ</h1>
        <p>نصائح الحمل والرضاعة</p>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="homePage" class="page">
        <button id="startBtn">✨ ابدأي الآن ✨</button>
        <button id="testBtn">🔔 اختبر الإشعار</button>
        <div class="status" id="statusMsg">🔘 اضغط ابدأي الآن لمنح الإذن</div>
        <footer>⭐ الإشعارات ستعمل عند فتح التطبيق</footer>
    </div>

    <!-- صفحة الخيارات -->
    <div id="optionsPage" class="page hidden">
        <button id="pregnancyBtn" class="option-btn">🤰 أثناء الحمل</button>
        <button id="breastfeedBtn" class="option-btn">🍼 أثناء الرضاعة</button>
        <button id="backHome" class="back-btn">🔙 الرئيسية</button>
    </div>

    <!-- صفحة نصائح الحمل -->
    <div id="pregnancyPage" class="page hidden">
        <div class="tips-list" id="pregnancyList"></div>
        <button id="backToOptionsPreg" class="back-btn">🔙 رجوع</button>
        <button id="homeFromPreg" class="back-btn">🏠 الرئيسية</button>
    </div>

    <!-- صفحة نصائح الرضاعة -->
    <div id="breastfeedPage" class="page hidden">
        <div class="tips-list" id="breastfeedList"></div>
        <button id="backToOptionsBreast" class="back-btn">🔙 رجوع</button>
        <button id="homeFromBreast" class="back-btn">🏠 الرئيسية</button>
    </div>
</div>

<script>
    // النصائح
    const pregnancyTips = [
        "ارفعي رجلك شويه لو حاسه بتعب",
        "اشربي ميه كتير",
        "امشي شويه حتى لو عشر دقايق",
        "خدي نفس عميق",
        "البسي حاجه مريحه مش ديقه",
        "كلي وجبات خفيفه علي مدار اليوم",
        "متقفيش علي رجلك كتير",
        "نامي علي جنبك الشمال"
    ];
    const breastfeedingTips = [
        "اعدلي ضهرك",
        "خلي ضهرك مستقيم",
        "ريحي كتفك",
        "قربي الطفل منك",
        "متتنيش رقبتك",
        "متشيليش حاجه تقيله",
        "خذي وقتك في التمارين",
        "استرخي أثناء الرضاعة"
    ];

    // عناصر الصفحات
    const homePage = document.getElementById('homePage');
    const optionsPage = document.getElementById('optionsPage');
    const pregnancyPageDiv = document.getElementById('pregnancyPage');
    const breastfeedPageDiv = document.getElementById('breastfeedPage');
    const statusDiv = document.getElementById('statusMsg');

    let currentContext = "pregnancy";
    let notificationInterval = null;
    let permissionGranted = false;

    // عرض النصائح في الصفحات
    document.getElementById('pregnancyList').innerHTML = pregnancyTips.map(t => `<div class="tip-item">🌸 ${t}</div>`).join('');
    document.getElementById('breastfeedList').innerHTML = breastfeedingTips.map(t => `<div class="tip-item">🌸 ${t}</div>`).join('');

    function updateStatus(msg, isError = false) {
        statusDiv.innerHTML = msg;
        statusDiv.style.background = isError ? "#ffe0b3" : "#ffdce4";
    }

    // إرسال إشعار
    function sendNotification(tipText) {
        if (!permissionGranted) return;
        new Notification("🌷 نصيحة دليلكِ", {
            body: tipText,
            icon: "https://cdn-icons-png.flaticon.com/512/3156/3156068.png"
        });
        updateStatus(`📢 تم: ${tipText}`);
    }

    // إرسال نصيحة عشوائية حسب السياق
    function sendRandomTip() {
        const tips = currentContext === 'pregnancy' ? pregnancyTips : breastfeedingTips;
        const random = Math.floor(Math.random() * tips.length);
        sendNotification(tips[random]);
    }

    // بدء المؤقت (كل 30 ثانية)
    function startTimer() {
        if (notificationInterval) clearInterval(notificationInterval);
        if (permissionGranted) {
            notificationInterval = setInterval(sendRandomTip, 30000); // 30 seconds
            updateStatus(`✅ الإشعارات مفعلة • كل 30 ثانية • ${currentContext === 'pregnancy' ? 'حمل' : 'رضاعة'}`);
        }
    }

    function stopTimer() {
        if (notificationInterval) {
            clearInterval(notificationInterval);
            notificationInterval = null;
        }
    }

    // طلب الإذن
    async function requestPermission() {
        if (!("Notification" in window)) {
            updateStatus("❌ المتصفح لا يدعم الإشعارات", true);
            return false;
        }
        if (Notification.permission === 'granted') {
            permissionGranted = true;
            updateStatus("✅ الإذن موجود");
            startTimer();
            return true;
        } else if (Notification.permission !== 'denied') {
            const result = await Notification.requestPermission();
            if (result === 'granted') {
                permissionGranted = true;
                updateStatus("✅ تم منح الإذن");
                startTimer();
                return true;
            } else {
                updateStatus("❌ تم رفض الإذن", true);
                return false;
            }
        } else {
            updateStatus("❌ الإشعارات محظورة. اذهب لإعدادات الموقع واسمح بها.", true);
            return false;
        }
    }

    // تغيير السياق
    function setContext(context) {
        currentContext = context;
        if (permissionGranted) {
            sendNotification(`الآن أنتِ في قسم ${context === 'pregnancy' ? 'الحمل 🤰' : 'الرضاعة 🍼'}`);
            startTimer(); // إعادة تشغيل المؤقت مع السياق الجديد
        }
    }

    // أزرار التنقل
    document.getElementById('startBtn').onclick = async () => {
        await requestPermission();
        homePage.classList.add('hidden');
        optionsPage.classList.remove('hidden');
    };
    document.getElementById('testBtn').onclick = async () => {
        if (!permissionGranted) {
            await requestPermission();
        }
        if (permissionGranted) {
            sendRandomTip();
        } else {
            alert("الرجاء السماح بالإشعارات أولاً عبر زر 'ابدأي الآن'");
        }
    };
    document.getElementById('pregnancyBtn').onclick = () => {
        optionsPage.classList.add('hidden');
        pregnancyPageDiv.classList.remove('hidden');
        setContext('pregnancy');
    };
    document.getElementById('breastfeedBtn').onclick = () => {
        optionsPage.classList.add('hidden');
        breastfeedPageDiv.classList.remove('hidden');
        setContext('breastfeed');
    };
    document.getElementById('backHome').onclick = () => {
        optionsPage.classList.add('hidden');
        homePage.classList.remove('hidden');
    };
    document.getElementById('backToOptionsPreg').onclick = () => {
        pregnancyPageDiv.classList.add('hidden');
        optionsPage.classList.remove('hidden');
    };
    document.getElementById('homeFromPreg').onclick = () => {
        pregnancyPageDiv.classList.add('hidden');
        homePage.classList.remove('hidden');
    };
    document.getElementById('backToOptionsBreast').onclick = () => {
        breastfeedPageDiv.classList.add('hidden');
        optionsPage.classList.remove('hidden');
    };
    document.getElementById('homeFromBreast').onclick = () => {
        breastfeedPageDiv.classList.add('hidden');
        homePage.classList.remove('hidden');
    };

    // عند تحميل الصفحة نتحقق من الإذن المسبق
    if (Notification.permission === 'granted') {
        permissionGranted = true;
        updateStatus("✅ الإذن موجود - اضغط ابدأي الآن");
    }
</script>
</body>
</html>
