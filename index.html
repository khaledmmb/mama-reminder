<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>دليل الحمل والرضاعة - إشعارات للجوال</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #fdeff2 0%, #fff5f7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .app-header {
            background: #ff9eb5;
            padding: 20px 24px;
            text-align: center;
            color: white;
        }
        .app-header h1 { font-size: 1.7rem; }
        .page { padding: 28px 24px 32px; }
        .hidden { display: none; }
        .btn-start, .test-btn {
            background: #ff7b9c;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 16px;
            width: 100%;
            border-radius: 100px;
            cursor: pointer;
            margin: 10px 0;
        }
        .test-btn { background: #9b59b6; font-size: 1.2rem; }
        .option-btn {
            background: #ffe3e9;
            border: none;
            color: #a13e57;
            font-size: 1.3rem;
            padding: 18px;
            width: 100%;
            border-radius: 60px;
            margin: 16px 0;
            cursor: pointer;
        }
        .tips-list {
            background: #fff0f3;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
        }
        .tip-item {
            background: white;
            padding: 12px 18px;
            margin: 10px 0;
            border-radius: 60px;
            border-right: 5px solid #ff9eb5;
        }
        .notification-panel {
            background: #f9e6eb;
            border-radius: 28px;
            padding: 18px;
            margin: 20px 0;
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        select, input {
            background: white;
            border: 1px solid #ffb7c9;
            padding: 8px 12px;
            border-radius: 40px;
        }
        .save-btn, .back-btn {
            background: #ff9eb5;
            border: none;
            padding: 12px;
            border-radius: 60px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .back-btn { background: #ece2e5; color: #5c3b46; }
        .status {
            background: #ffdce4;
            border-radius: 50px;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            margin: 10px 0;
        }
        .install-note {
            background: #e8f0fe;
            color: #1a5a8a;
            padding: 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 10px;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 12px;
            color: #ac8a94;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1>👶🏻🌷 دليلكِ</h1>
        <p>نصائح الحمل والرضاعة • إشعارات ذكية للجوال</p>
    </div>

    <div id="homePage" class="page">
        <button id="startBtn" class="btn-start">✨ ابدأي الآن ✨</button>
        <button id="testBtn" class="test-btn">🔔 اختبر الإشعار</button>
        <div class="notification-panel">
            <h3 style="color:#b13e5e;">⚙️ إعدادات الإشعارات</h3>
            <div class="control-group">
                <label>📢 تفعيل الإشعارات:</label>
                <input type="checkbox" id="notifToggle" checked>
            </div>
            <div class="control-group">
                <label>⏱️ التكرار (ثانية):</label>
                <select id="intervalSelect">
                    <option value="30">كل 30 ثانية</option>
                    <option value="60" selected>كل 60 ثانية (أنسب للجوال)</option>
                    <option value="120">كل 120 ثانية</option>
                </select>
            </div>
            <div class="control-group">
                <label>🔊 الصوت:</label>
                <input type="checkbox" id="soundToggle" checked>
            </div>
            <div class="control-group">
                <label>📳 الاهتزاز:</label>
                <input type="checkbox" id="vibrateToggle" checked>
            </div>
            <button id="saveBtn" class="save-btn">💾 حفظ الإعدادات</button>
            <div class="status" id="statusMsg">🔔 جاهزة</div>
            <div class="install-note" id="installNote">
                📱 لتحسين الإشعارات: أضف هذا الموقع إلى الشاشة الرئيسية (⋮ → إضافة إلى الشاشة الرئيسية)
            </div>
        </div>
    </div>

    <div id="optionsPage" class="page hidden">
        <button id="pregnancyBtn" class="option-btn">🤰 أثناء الحمل</button>
        <button id="breastfeedBtn" class="option-btn">🍼 أثناء الرضاعة</button>
        <button id="backHomeOptions" class="back-btn">🔙 الرئيسية</button>
    </div>

    <div id="pregnancyPage" class="page hidden">
        <div class="tips-list" id="pregnancyList"></div>
        <button id="backToOptionsPreg" class="back-btn">🔙 رجوع</button>
        <button id="homeFromPreg" class="back-btn">🏠 الرئيسية</button>
    </div>

    <div id="breastfeedPage" class="page hidden">
        <div class="tips-list" id="breastfeedList"></div>
        <button id="backToOptionsBreast" class="back-btn">🔙 رجوع</button>
        <button id="homeFromBreast" class="back-btn">🏠 الرئيسية</button>
    </div>
    <footer>⭐ الإشعارات تعمل أثناء فتح التطبيق • عند العودة ستتلقى نصيحة فورية</footer>
</div>

<script>
    // ===================== قوائم النصائح =====================
    const pregnancyTips = [
        "افردي ضهرك ولا تجلسين منحنية", "كلي وجبات خفيفة غنية بالحديد",
        "ارفعي رجليك للتخفيف من التورم", "نامي على جنبك الأيسر",
        "تجنبي حمل الأشياء الثقيلة", "امشِ 10 دقائق يومياً",
        "اشربي ماء بكثرة", "خذي حماماً دافئاً للاسترخاء"
    ];
    const breastfeedingTips = [
        "اجلسي بوضعية مريحة مع دعم الظهر", "قربي الطفل من ثديكِ، لا تميلي برقبتك",
        "اشربي الكثير من الماء والسوائل", "تنفسي بعمق أثناء الرضاعة",
        "لا تثني رقبتك، استخدمي وسادة", "ارتدي ملابس قطنية مريحة",
        "خصصي وقتاً للراحة بعد الرضاعة", "مارسي تمارين إطالة خفيفة"
    ];

    // ===================== عناصر DOM =====================
    const home = document.getElementById('homePage');
    const options = document.getElementById('optionsPage');
    const pregPage = document.getElementById('pregnancyPage');
    const breastPage = document.getElementById('breastfeedPage');
    const notifToggle = document.getElementById('notifToggle');
    const intervalSelect = document.getElementById('intervalSelect');
    const soundToggle = document.getElementById('soundToggle');
    const vibrateToggle = document.getElementById('vibrateToggle');
    const saveBtn = document.getElementById('saveBtn');
    const statusDiv = document.getElementById('statusMsg');
    const testBtn = document.getElementById('testBtn');
    const startBtn = document.getElementById('startBtn');

    // ===================== متغيرات الحالة =====================
    let currentContext = "pregnancy";   // 'pregnancy' or 'breastfeed'
    let isNotifEnabled = true;
    let isSoundEnabled = true;
    let isVibrateEnabled = true;
    let intervalSeconds = 60;            // افتراضي 60 ثانية
    let timerId = null;                  // معرف setTimeout
    let isPageVisible = true;            // تتبع رؤية الصفحة
    let lastNotificationTime = 0;        // لمنع الإشعارات الفورية المتكررة عند العودة

    // ===================== دوال مساعدة =====================
    function updateStatus(msg, isError = false) {
        statusDiv.innerHTML = msg;
        statusDiv.style.background = isError ? "#ffe0b3" : "#ffdce4";
    }

    // عرض النصائح في الصفحات
    function loadTips() {
        document.getElementById('pregnancyList').innerHTML = pregnancyTips.map(t => `<div class="tip-item">🌸 ${t}</div>`).join('');
        document.getElementById('breastfeedList').innerHTML = breastfeedingTips.map(t => `<div class="tip-item">🌸 ${t}</div>`).join('');
    }
    loadTips();

    // تشغيل الصوت (نغمة قصيرة)
    let audioCtx = null;
    function playSound() {
        if (!isSoundEnabled) return;
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.2;
            osc.type = "sine";
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.4);
        } catch(e) { console.warn("صوت غير مدعوم"); }
    }

    // اهتزاز
    function vibrate() {
        if (isVibrateEnabled && navigator.vibrate) {
            navigator.vibrate(200);
        }
    }

    // عرض إشعار فعلي
    function showNotification(tipText, contextName) {
        if (!isNotifEnabled) return;
        if (Notification.permission !== 'granted') {
            updateStatus("⚠️ الإذن غير مفعل - اضغط 'ابدأ' واسمح", true);
            return;
        }
        const contextDisplay = contextName === 'pregnancy' ? 'الحمل' : 'الرضاعة';
        const notification = new Notification("🌷 نصيحة دليلكِ", {
            body: `${tipText}`,
            icon: "https://cdn-icons-png.flaticon.com/512/3156/3156068.png",
            silent: true,   // نتحكم بالصوت يدوياً
            vibrate: isVibrateEnabled ? [200,100,200] : undefined
        });
        playSound();
        vibrate();
        setTimeout(() => notification.close(), 6000);
        lastNotificationTime = Date.now();
        updateStatus(`✅ أرسل: ${tipText.substring(0, 35)}...`);
    }

    // إرسال إشعار دوري (يتم استدعاؤها من المؤقت)
    function sendPeriodicNotification() {
        if (!isNotifEnabled) return;
        if (Notification.permission !== 'granted') return;
        if (!isPageVisible) {
            // إذا كانت الصفحة غير مرئية، لا نرسل إشعاراً الآن (سنرسل عند العودة)
            return;
        }
        const tips = currentContext === 'pregnancy' ? pregnancyTips : breastfeedingTips;
        const randomTip = tips[Math.floor(Math.random() * tips.length)];
        showNotification(randomTip, currentContext);
    }

    // جدولة الإشعار التالي (باستخدام setTimeout بدلاً من setInterval)
    function scheduleNextNotification() {
        if (timerId) clearTimeout(timerId);
        if (!isNotifEnabled) return;
        if (Notification.permission !== 'granted') return;
        if (!isPageVisible) return;  // إذا كانت الصفحة مخفية لا نجدول شيئاً
        
        timerId = setTimeout(() => {
            sendPeriodicNotification();
            scheduleNextNotification(); // إعادة الجدولة بعد الإرسال
        }, intervalSeconds * 1000);
    }

    // إيقاف الجدولة بالكامل
    function stopNotifications() {
        if (timerId) {
            clearTimeout(timerId);
            timerId = null;
        }
    }

    // إعادة تشغيل الجدولة بناءً على الإعدادات الحالية وحالة الرؤية
    function restartNotifications() {
        stopNotifications();
        if (isNotifEnabled && Notification.permission === 'granted' && isPageVisible) {
            scheduleNextNotification();
            updateStatus(`🔔 مفعلة • كل ${intervalSeconds} ثانية • ${currentContext === 'pregnancy' ? 'حمل' : 'رضاعة'}`);
        } else {
            updateStatus(isNotifEnabled ? "⏸️ معلقة (الصفحة غير مرئية أو الإذن مفقود)" : "🔕 معطلة");
        }
    }

    // عند عودة الصفحة للرؤية، نرسل إشعاراً فورياً (واحد) ثم نستأنف الجدولة
    function onPageVisible() {
        if (!isPageVisible) return;
        if (isNotifEnabled && Notification.permission === 'granted') {
            // إرسال إشعار ترحيبي فوري (تجنب الإرسال إذا كان آخر إشعار قبل أقل من 10 ثوانٍ)
            const now = Date.now();
            if (now - lastNotificationTime > 10000) {
                const tips = currentContext === 'pregnancy' ? pregnancyTips : breastfeedingTips;
                const randomTip = tips[Math.floor(Math.random() * tips.length)];
                showNotification(`مرحباً بعودتكِ 🌸 ${randomTip}`, currentContext);
            }
            restartNotifications();
        }
    }

    // ===================== مراقبة رؤية الصفحة =====================
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            isPageVisible = false;
            stopNotifications();
            updateStatus("⏸️ توقفت الإشعارات (الصفحة غير مرئية) - ستعود عند فتح التطبيق");
        } else {
            isPageVisible = true;
            onPageVisible();
        }
    });

    // ===================== طلب إذن الإشعارات =====================
    function requestNotificationPermission() {
        if (Notification.permission === 'granted') {
            updateStatus("✅ الإذن موجود");
            restartNotifications();
            return Promise.resolve(true);
        } else if (Notification.permission !== 'denied') {
            return Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    updateStatus("✅ تم منح الإذن");
                    restartNotifications();
                    return true;
                } else {
                    updateStatus("❌ تم رفض الإذن", true);
                    return false;
                }
            });
        } else {
            updateStatus("❌ الإشعارات محظورة - اذهب لإعدادات الموقع واسمح بها", true);
            return Promise.resolve(false);
        }
    }

    // ===================== حفظ الإعدادات من الواجهة =====================
    function saveSettings() {
        isNotifEnabled = notifToggle.checked;
        isSoundEnabled = soundToggle.checked;
        isVibrateEnabled = vibrateToggle.checked;
        intervalSeconds = parseInt(intervalSelect.value, 10);
        if (isNaN(intervalSeconds)) intervalSeconds = 60;
        
        stopNotifications();
        if (isNotifEnabled && Notification.permission === 'granted' && isPageVisible) {
            restartNotifications();
            // إشعار تأكيدي
            showNotification("تم حفظ الإعدادات ✅", currentContext);
        } else if (isNotifEnabled && Notification.permission !== 'granted') {
            requestNotificationPermission().then(() => restartNotifications());
        } else {
            updateStatus("🔕 الإشعارات معطلة");
        }
    }

    // ===================== تغيير السياق (حمل/رضاعة) =====================
    function setContext(context) {
        currentContext = context;
        if (isNotifEnabled && Notification.permission === 'granted' && isPageVisible) {
            showNotification(`الآن أنتِ في قسم ${context === 'pregnancy' ? 'الحمل 🤰' : 'الرضاعة 🍼'}`, context);
        }
        restartNotifications(); // لإعادة الجدولة (نفس السياق)
    }

    // ===================== التنقل بين الصفحات =====================
    startBtn.onclick = async () => {
        home.classList.add('hidden');
        options.classList.remove('hidden');
        await requestNotificationPermission();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    };
    testBtn.onclick = async () => {
        if (Notification.permission === 'granted') {
            showNotification("✅ هذا إشعار تجريبي! التطبيق يعمل", currentContext);
        } else {
            await requestNotificationPermission();
            if (Notification.permission === 'granted') {
                showNotification("✅ تجربة ناجحة بعد السماح", currentContext);
            } else {
                alert("الرجاء السماح بالإشعارات أولاً من خلال زر 'ابدأي الآن'");
            }
        }
    };
    document.getElementById('pregnancyBtn').onclick = () => {
        options.classList.add('hidden');
        pregPage.classList.remove('hidden');
        setContext('pregnancy');
    };
    document.getElementById('breastfeedBtn').onclick = () => {
        options.classList.add('hidden');
        breastPage.classList.remove('hidden');
        setContext('breastfeed');
    };
    document.getElementById('backHomeOptions').onclick = () => {
        options.classList.add('hidden');
        home.classList.remove('hidden');
    };
    document.getElementById('backToOptionsPreg').onclick = () => {
        pregPage.classList.add('hidden');
        options.classList.remove('hidden');
    };
    document.getElementById('homeFromPreg').onclick = () => {
        pregPage.classList.add('hidden');
        home.classList.remove('hidden');
    };
    document.getElementById('backToOptionsBreast').onclick = () => {
        breastPage.classList.add('hidden');
        options.classList.remove('hidden');
    };
    document.getElementById('homeFromBreast').onclick = () => {
        breastPage.classList.add('hidden');
        home.classList.remove('hidden');
    };
    saveBtn.onclick = saveSettings;

    // ===================== تهيئة أولية =====================
    function init() {
        // قراءة الإعدادات من الواجهة (القيم الافتراضية)
        isNotifEnabled = notifToggle.checked;
        isSoundEnabled = soundToggle.checked;
        isVibrateEnabled = vibrateToggle.checked;
        intervalSeconds = parseInt(intervalSelect.value, 10);
        if (Notification.permission === 'granted') {
            updateStatus("✅ الإذن موجود - ابدأي الآن");
        } else {
            updateStatus("🔘 اضغط 'ابدأي الآن' لمنح الإذن");
        }
        // التأكد من أن الصفحة مرئية في البداية
        isPageVisible = !document.hidden;
    }
    init();
</script>
</body>
</html>
