<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>دليلكِ الصوتي - جهارة صوت قابلة للزيادة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #fdeff2 0%, #fff5f7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .app-header {
            background: #ff9eb5;
            padding: 20px 24px;
            text-align: center;
            color: white;
        }
        .app-header h1 { font-size: 1.7rem; }
        .page { padding: 28px 24px 32px; }
        .hidden { display: none; }
        .btn-start, .test-btn {
            background: #ff7b9c;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 16px;
            width: 100%;
            border-radius: 100px;
            cursor: pointer;
            margin: 10px 0;
        }
        .test-btn { background: #9b59b6; font-size: 1.2rem; }
        .option-btn {
            background: #ffe3e9;
            border: none;
            color: #a13e57;
            font-size: 1.3rem;
            padding: 18px;
            width: 100%;
            border-radius: 60px;
            margin: 16px 0;
            cursor: pointer;
        }
        .tips-list {
            background: #fff0f3;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .tip-item {
            background: white;
            padding: 12px 18px;
            margin: 10px 0;
            border-radius: 60px;
            border-right: 5px solid #ff9eb5;
            font-size: 1rem;
        }
        .notification-panel {
            background: #f9e6eb;
            border-radius: 28px;
            padding: 18px;
            margin: 20px 0;
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        select, input, .volume-slider {
            background: white;
            border: 1px solid #ffb7c9;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .volume-slider {
            width: 150px;
            cursor: pointer;
        }
        .save-btn, .back-btn {
            background: #ff9eb5;
            border: none;
            padding: 12px;
            border-radius: 60px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .back-btn { background: #ece2e5; color: #5c3b46; }
        .status {
            background: #ffdce4;
            border-radius: 50px;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            margin: 10px 0;
        }
        .install-note {
            background: #e8f0fe;
            color: #1a5a8a;
            padding: 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 10px;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 12px;
            color: #ac8a94;
        }
        .sound-count {
            font-size: 0.7rem;
            color: #b34e6e;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1>🔊 دليلكِ الصوتي</h1>
        <p>نصائح مسموعة بصوت أعلى (حتى 200%)</p>
    </div>

    <div id="homePage" class="page">
        <button id="startBtn" class="btn-start">✨ ابدأي الآن ✨</button>
        <button id="testBtn" class="test-btn">🔔 اختبر الإشعار</button>
        <div class="notification-panel">
            <h3 style="color:#b13e5e;">⚙️ إعدادات الصوت والإشعارات</h3>
            <div class="control-group">
                <label>📢 تفعيل الإشعارات:</label>
                <input type="checkbox" id="notifToggle" checked>
            </div>
            <div class="control-group">
                <label>⏱️ التكرار (ثانية):</label>
                <select id="intervalSelect">
                    <option value="10">كل 10 ثوانٍ</option>
                    <option value="30" selected>كل 30 ثانية</option>
                    <option value="60">كل 60 ثانية</option>
                </select>
            </div>
            <div class="control-group">
                <label>🔊 جهارة الصوت (بالمئة):</label>
                <input type="range" id="volumeBoost" class="volume-slider" min="50" max="200" value="150" step="5">
                <span id="volumeValue">150%</span>
            </div>
            <div class="control-group">
                <label>📳 الاهتزاز:</label>
                <input type="checkbox" id="vibrateToggle" checked>
            </div>
            <button id="saveBtn" class="save-btn">💾 حفظ الإعدادات</button>
            <div class="status" id="statusMsg">🔔 جاهزة</div>
            <div class="install-note">
                📱 لتحسين الإشعارات: أضف هذا الموقع إلى الشاشة الرئيسية
            </div>
        </div>
    </div>

    <div id="optionsPage" class="page hidden">
        <button id="pregnancyBtn" class="option-btn">🤰 أثناء الحمل</button>
        <button id="breastfeedBtn" class="option-btn">🍼 أثناء الرضاعة</button>
        <button id="backHomeOptions" class="back-btn">🔙 الرئيسية</button>
    </div>

    <div id="pregnancyPage" class="page hidden">
        <div class="tips-list" id="pregnancyList"></div>
        <div class="sound-count" id="pregnancyCount"></div>
        <button id="backToOptionsPreg" class="back-btn">🔙 رجوع</button>
        <button id="homeFromPreg" class="back-btn">🏠 الرئيسية</button>
    </div>

    <div id="breastfeedPage" class="page hidden">
        <div class="tips-list" id="breastfeedList"></div>
        <div class="sound-count" id="breastfeedCount"></div>
        <button id="backToOptionsBreast" class="back-btn">🔙 رجوع</button>
        <button id="homeFromBreast" class="back-btn">🏠 الرئيسية</button>
    </div>
    <footer>⭐ تحكم بجهارة الصوت حتى 200% • إشعارات باسم النصيحة</footer>
</div>

<script>
    // ============================================================
    // قوائم الملفات الصوتية (بدون امتداد) - أدخل أسماءك هنا كما هي بالضبط
    // ============================================================
    const pregnancySoundFiles = [
        "ارفعي_رجلك_شويه_لو_حاسه_بتعب",
        "اشربى_ميه_كثير",
        "البسي_حاجه_مريحه_مش_ديفه",
        "امشي_شويه_حتى_لو_عشر_دقايق",
        "خدي_نفس_عميق",
        "كلي_وجبات_خفيفه_علي_مدار_اليوم",
        "متقفيض_علي_رجلك_كثير",
        "نامي_علي_جنبك_الشمال"
    ];

    const breastfeedingSoundFiles = [
        "اعدلي_ضهرك",
        "خلي_ضهرك_مستقيم",
        "ريحي_كتفك",
        "قربي_الطفل_منك",
        "متتنيش_رقبتك",
        "متشيليش_حاجه_تقيله",
        "وقت_التمارين",
        "وقت_الرضاعه"
    ];
    // ============================================================

    const AUDIO_BASE = '/audio/';
    const PREG_FOLDER = 'pregnancy/';
    const BF_FOLDER = 'breastfeeding/';
    const EXT = '.ogg';

    // عناصر الواجهة
    const homePage = document.getElementById('homePage');
    const optionsPage = document.getElementById('optionsPage');
    const pregnancyPageDiv = document.getElementById('pregnancyPage');
    const breastfeedPageDiv = document.getElementById('breastfeedPage');
    const notifToggle = document.getElementById('notifToggle');
    const intervalSelect = document.getElementById('intervalSelect');
    const volumeBoostSlider = document.getElementById('volumeBoost');
    const volumeValueSpan = document.getElementById('volumeValue');
    const vibrateToggle = document.getElementById('vibrateToggle');
    const saveBtn = document.getElementById('saveBtn');
    const statusDiv = document.getElementById('statusMsg');
    const testBtn = document.getElementById('testBtn');
    const startBtn = document.getElementById('startBtn');

    let currentContext = "pregnancy";
    let isNotifEnabled = true;
    let isVibrateEnabled = true;
    let intervalSeconds = 30;
    let volumePercent = 150;   // 150% = 1.5 gain
    let timerId = null;
    let isPageVisible = true;
    let lastNotificationTime = 0;
    let audioContext = null;    // سياق Web Audio لتطبيق gain
    let currentGainNode = null;

    // تحديث عرض قيمة الصوت
    volumeBoostSlider.addEventListener('input', () => {
        volumePercent = parseInt(volumeBoostSlider.value);
        volumeValueSpan.innerText = volumePercent + '%';
    });

    // دالة لإنشاء AudioContext وتشغيل الملف مع gain مخصص
    async function playSoundWithGain(fileName, folder) {
        if (!isSoundEnabled()) return false; // نتحقق من الصوت من خلال isSoundEnabled (سنضيفها لاحقاً)
        // نستخدم isSoundEnabled من الإعدادات
        if (!window._soundEnabled) return false;
        
        const path = `${AUDIO_BASE}${folder}${fileName}${EXT}`;
        try {
            // جلب الملف كـ ArrayBuffer
            const response = await fetch(path);
            if (!response.ok) throw new Error('ملف غير موجود');
            const arrayBuffer = await response.arrayBuffer();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            
            // إنشاء مصدر الصوت
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            
            // عقدة التحكم في الصوت (Gain)
            const gainNode = audioContext.createGain();
            const gainValue = volumePercent / 100;
            gainNode.gain.value = Math.min(gainValue, 2.0); // قصوى 200%
            
            source.connect(gainNode);
            gainNode.connect(audioContext.destination);
            source.start();
            return true;
        } catch (err) {
            console.warn("خطأ في تشغيل الصوت:", err);
            updateStatus(`⚠️ فشل تشغيل: ${fileName}`, true);
            return false;
        }
    }

    // وظيفة لتشغيل الصوت بالطريقة القديمة (بديل إذا فشل Web Audio)
    function playSoundFallback(fileName, folder) {
        if (!window._soundEnabled) return;
        const path = `${AUDIO_BASE}${folder}${fileName}${EXT}`;
        const audio = new Audio(path);
        audio.volume = Math.min(volumePercent / 100, 1.0); // لا يمكن تجاوز 1 في Audio العادي
        audio.play().catch(e => console.warn(e));
    }

    // متغير لتخزين إعدادات الصوت
    let _soundEnabled = true;
    function isSoundEnabled() { return _soundEnabled; }

    // تحديث واجهة الحالة
    function updateStatus(msg, isError = false) {
        statusDiv.innerHTML = msg;
        statusDiv.style.background = isError ? "#ffe0b3" : "#ffdce4";
    }

    // عرض قوائم الملفات
    function displayFileLists() {
        const pregContainer = document.getElementById('pregnancyList');
        const breastContainer = document.getElementById('breastfeedList');
        const pregCountSpan = document.getElementById('pregnancyCount');
        const breastCountSpan = document.getElementById('breastfeedCount');
        pregContainer.innerHTML = pregnancySoundFiles.map(name => `<div class="tip-item">🎵 ${name.replace(/_/g, ' ')}</div>`).join('');
        breastContainer.innerHTML = breastfeedingSoundFiles.map(name => `<div class="tip-item">🎵 ${name.replace(/_/g, ' ')}</div>`).join('');
        pregCountSpan.innerText = `📂 عدد نصائح الحمل: ${pregnancySoundFiles.length}`;
        breastCountSpan.innerText = `📂 عدد نصائح الرضاعة: ${breastfeedingSoundFiles.length}`;
    }
    displayFileLists();

    // الاهتزاز
    function vibrate() {
        if (isVibrateEnabled && navigator.vibrate) {
            navigator.vibrate(200);
        }
    }

    // عرض إشعار نصي
    function showNotificationText(fileName) {
        if (!isNotifEnabled) return false;
        if (Notification.permission !== 'granted') return false;
        const displayName = fileName.replace(/_/g, ' ');
        const options = {
            body: displayName,
            icon: "https://cdn-icons-png.flaticon.com/512/3156/3156068.png",
            vibrate: isVibrateEnabled ? [200, 100, 200] : undefined
        };
        if (!isVibrateEnabled) options.silent = true;
        const notification = new Notification("🌷 نصيحة دليلكِ", options);
        setTimeout(() => notification.close(), 6000);
        lastNotificationTime = Date.now();
        return true;
    }

    // إرسال نصيحة عشوائية مع الصوت الأعلى
    async function sendRandomTip(showAlerts = false) {
        if (!isNotifEnabled) {
            if (showAlerts) alert("⚠️ الإشعارات معطلة في الإعدادات.");
            return false;
        }
        if (Notification.permission !== 'granted') {
            if (showAlerts) alert("⚠️ لم يتم منح إذن الإشعارات. اضغط على 'ابدأي الآن' أولاً.");
            return false;
        }
        if (!isPageVisible) {
            if (showAlerts) alert("⚠️ التطبيق في الخلفية، افتحه أولاً.");
            return false;
        }

        let soundList = (currentContext === 'pregnancy') ? pregnancySoundFiles : breastfeedingSoundFiles;
        let folder = (currentContext === 'pregnancy') ? PREG_FOLDER : BF_FOLDER;

        if (soundList.length === 0) {
            if (showAlerts) alert("⚠️ لا توجد ملفات صوتية في القائمة");
            return false;
        }

        const randomIndex = Math.floor(Math.random() * soundList.length);
        const fileName = soundList[randomIndex];

        showNotificationText(fileName);

        if (_soundEnabled) {
            // استخدام Web Audio مع gain
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();
            }
            await playSoundWithGain(fileName, folder).catch(() => playSoundFallback(fileName, folder));
        }
        vibrate();
        updateStatus(`📢 تم: ${fileName.replace(/_/g, ' ')} (جهارة ${volumePercent}%)`);
        return true;
    }

    // جدولة الإشعارات
    function scheduleNext() {
        if (timerId) clearTimeout(timerId);
        if (!isNotifEnabled || Notification.permission !== 'granted' || !isPageVisible) return;
        timerId = setTimeout(() => {
            sendRandomTip(false);
            scheduleNext();
        }, intervalSeconds * 1000);
    }

    function stopScheduler() {
        if (timerId) { clearTimeout(timerId); timerId = null; }
    }

    function restartScheduler() {
        stopScheduler();
        if (isNotifEnabled && Notification.permission === 'granted' && isPageVisible) {
            scheduleNext();
            updateStatus(`🔔 مفعلة • كل ${intervalSeconds} ثانية • ${currentContext === 'pregnancy' ? 'حمل' : 'رضاعة'} • جهارة ${volumePercent}%`);
        } else {
            updateStatus(isNotifEnabled ? "⏸️ معلقة" : "🔕 معطلة");
        }
    }

    function onPageVisible() {
        if (!isPageVisible) return;
        if (isNotifEnabled && Notification.permission === 'granted') {
            const now = Date.now();
            if (now - lastNotificationTime > 10000) sendRandomTip(false);
            restartScheduler();
        }
    }

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            isPageVisible = false;
            stopScheduler();
            updateStatus("⏸️ توقفت الإشعارات (التطبيق في الخلفية)");
        } else {
            isPageVisible = true;
            onPageVisible();
        }
    });

    function requestNotificationPermission() {
        if (Notification.permission === 'granted') {
            updateStatus("✅ الإذن موجود");
            restartScheduler();
            return Promise.resolve(true);
        } else if (Notification.permission !== 'denied') {
            return Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    updateStatus("✅ تم منح الإذن");
                    restartScheduler();
                    return true;
                } else {
                    updateStatus("❌ تم رفض الإذن", true);
                    return false;
                }
            });
        } else {
            updateStatus("❌ الإشعارات محظورة - اذهب لإعدادات الموقع", true);
            return Promise.resolve(false);
        }
    }

    function saveSettings() {
        isNotifEnabled = notifToggle.checked;
        _soundEnabled = true; // الصوت مفعل دائماً (لا يوجد زر لإيقافه، فقط جهارة)
        isVibrateEnabled = vibrateToggle.checked;
        intervalSeconds = parseInt(intervalSelect.value, 10);
        if (isNaN(intervalSeconds)) intervalSeconds = 30;
        volumePercent = parseInt(volumeBoostSlider.value);
        volumeValueSpan.innerText = volumePercent + '%';
        
        stopScheduler();
        if (isNotifEnabled && Notification.permission === 'granted' && isPageVisible) {
            restartScheduler();
            showNotificationText("تم حفظ الإعدادات 🔊");
            // اختبار الصوت بأول ملف
            let firstFile = (currentContext === 'pregnancy') ? pregnancySoundFiles[0] : breastfeedingSoundFiles[0];
            if (firstFile) {
                let folder = (currentContext === 'pregnancy') ? PREG_FOLDER : BF_FOLDER;
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') audioContext.resume();
                playSoundWithGain(firstFile, folder).catch(() => playSoundFallback(firstFile, folder));
            }
        } else if (isNotifEnabled && Notification.permission !== 'granted') {
            requestNotificationPermission().then(() => restartScheduler());
        } else {
            updateStatus("🔕 الإشعارات معطلة");
        }
    }

    function setContext(context) {
        currentContext = context;
        if (isNotifEnabled && Notification.permission === 'granted' && isPageVisible) {
            showNotificationText(`الآن أنتِ في قسم ${context === 'pregnancy' ? 'الحمل 🤰' : 'الرضاعة 🍼'}`);
        }
        restartScheduler();
    }

    // الأزرار
    startBtn.onclick = async () => {
        homePage.classList.add('hidden');
        optionsPage.classList.remove('hidden');
        await requestNotificationPermission();
        // تهيئة AudioContext
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') await audioContext.resume();
    };
    testBtn.onclick = async () => {
        await sendRandomTip(true);
    };
    document.getElementById('pregnancyBtn').onclick = () => {
        optionsPage.classList.add('hidden');
        pregnancyPageDiv.classList.remove('hidden');
        setContext('pregnancy');
    };
    document.getElementById('breastfeedBtn').onclick = () => {
        optionsPage.classList.add('hidden');
        breastfeedPageDiv.classList.remove('hidden');
        setContext('breastfeed');
    };
    document.getElementById('backHomeOptions').onclick = () => {
        optionsPage.classList.add('hidden');
        homePage.classList.remove('hidden');
    };
    document.getElementById('backToOptionsPreg').onclick = () => {
        pregnancyPageDiv.classList.add('hidden');
        optionsPage.classList.remove('hidden');
    };
    document.getElementById('homeFromPreg').onclick = () => {
        pregnancyPageDiv.classList.add('hidden');
        homePage.classList.remove('hidden');
    };
    document.getElementById('backToOptionsBreast').onclick = () => {
        breastfeedPageDiv.classList.add('hidden');
        optionsPage.classList.remove('hidden');
    };
    document.getElementById('homeFromBreast').onclick = () => {
        breastfeedPageDiv.classList.add('hidden');
        homePage.classList.remove('hidden');
    };
    saveBtn.onclick = saveSettings;

    function init() {
        isNotifEnabled = notifToggle.checked;
        _soundEnabled = true;
        isVibrateEnabled = vibrateToggle.checked;
        intervalSeconds = parseInt(intervalSelect.value, 10);
        if (isNaN(intervalSeconds)) intervalSeconds = 30;
        volumePercent = parseInt(volumeBoostSlider.value);
        volumeValueSpan.innerText = volumePercent + '%';
        isPageVisible = !document.hidden;
        if (Notification.permission === 'granted') {
            updateStatus("✅ الإذن موجود - ابدأي الآن");
        } else {
            updateStatus("🔘 اضغط 'ابدأي الآن' لمنح الإذن");
        }
        if (pregnancySoundFiles.length === 0 || breastfeedingSoundFiles.length === 0) {
            updateStatus("⚠️ أضيفي أسماء الملفات في القوائم", true);
        }
    }
    init();
</script>
</body>
</html>
